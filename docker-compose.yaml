services:
  llm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dual-model-llm-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # Mount local models folder to the container's models folder
      - ./models:/app/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped